<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPERSISTᶜᵛ | León Bot</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --oro: #ffcc00; --fondo: #0a0e14; --chat-bg: #111; }
        body { background: var(--fondo); font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-wrap { width: 95%; max-width: 400px; height: 95vh; display: flex; flex-direction: column; }
        .chat-container { flex: 1; background: var(--chat-bg); border: 2px solid var(--oro); border-radius: 25px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 15px rgba(255, 204, 0, 0.2); }
        .header { text-align: center; padding: 15px; border-bottom: 1px solid #333; color: var(--oro); }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; font-size: 14px; max-width: 80%; line-height: 1.4; position: relative; }
        .user-msg { align-self: flex-end; background: var(--oro); color: #000; font-weight: bold; border-bottom-right-radius: 2px; }
        .bot-msg { align-self: flex-start; background: #222; color: #fff; border: 1px solid #444; border-bottom-left-radius: 2px; }
        .input-area { padding: 15px; display: flex; gap: 10px; background: #000; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; outline: none; }
        button { background: var(--oro); border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

    <div class="chat-wrap">
        <div class="chat-container">
            <div class="header">
                <span style="font-size: 30px;">🦁</span>
                <h2 style="margin: 5px 0;">LEÓN BOT AI</h2>
                <small id="status">Verificando líder...</small>
            </div>
            <div id="chatBox"></div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Pregunta algo, líder...">
                <button id="sendBtn">➤</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBV9Su1N1_ZV_LC7jRngxorp0MCDXlqdkc",
            authDomain: "supersistcv.firebaseapp.com",
            projectId: "supersistcv",
            storageBucket: "supersistcv.firebasestorage.app",
            appId: "1:617639493726:web:dc8fcb573a4a0851d6f4cf"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusTxt = document.getElementById('status');

        function append(text, isUser) {
            const div = document.createElement('div');
            div.className = `msg ${isUser ? 'user-msg' : 'bot-msg'}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function llamarIA(pregunta) {
            statusTxt.innerText = "Rugiendo...";
            const API_KEY = "AIzaSyBa2vcZb8XsFbVCi6MRMSEtmBHrYOS9pOg";
            // URL corregida para evitar bloqueos en el servidor de TrebEdit
            const URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY;

            try {
                const r = await fetch(URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Eres León Bot de SUPERSIST CV, un asistente líder, motivador y experto en administración. Responde breve y con actitud: " + pregunta }] }]
                    })
                });
                const data = await r.json();
                const respuesta = data.candidates[0].content.parts[0].text;
                
                append(respuesta, false);

                // Guardar en la carpeta privada por usuario (Paso 2 completado)
                const user = auth.currentUser;
                if (user) {
                    db.collection("chats_usuarios").doc(user.uid).collection("mensajes").add({
                        pregunta: pregunta,
                        respuesta: respuesta,
                        fecha: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
            } catch (e) {
                append("Error al conectar con el León. Asegúrate de usar el Espacio de Trabajo.", false);
            }
            statusTxt.innerText = "En línea";
        }

        sendBtn.onclick = () => {
            const val = userInput.value.trim();
            if(!val) return;
            append(val, true);
            llamarIA(val);
            userInput.value = "";
        };

        userInput.addEventListener("keypress", (e) => { if(e.key === "Enter") sendBtn.click(); });

        auth.onAuthStateChanged((user) => {
            if (user) {
                statusTxt.innerText = "Líder conectado";
                append("¡Raaawr! Hola líder, estoy listo para apoyarte con la Sección D.", false);
            } else {
                statusTxt.innerText = "Modo Invitado";
                append("Inicia sesión para guardar tu historial.", false);
            }
        });
    </script>
</body>
</html>
