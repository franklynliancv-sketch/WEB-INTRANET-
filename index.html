<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPERSISTᶜᵛ | Registro</title>
    <style>
        body { background: #0a0e14; color: white; font-family: sans-serif; text-align: center; padding: 30px; }
        .card { border: 2px solid #ff6600; padding: 25px; border-radius: 20px; background: #161b22; display: inline-block; width: 90%; max-width: 320px; }
        input { display: block; margin: 15px auto; padding: 12px; width: 90%; border-radius: 8px; border: none; background: #2d333b; color: white; outline: none; }
        button { background: #ff6600; color: white; border: none; padding: 15px; width: 100%; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 16px; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="card">
        <h1 style="color: #ff6600; margin-bottom: 5px;">SUPERSISTᶜᵛ</h1>
        <p style="margin-top: 0; color: #888;">Gestión Administrativa - Sección D</p>
        
        <input type="email" id="correo" placeholder="Correo electrónico">
        <input type="password" id="clave" placeholder="Contraseña">
        
        <button id="btnRegistrar">¡ENTRAR AL PANEL!</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // TUS DATOS REALES DE LA CONSOLA
        const firebaseConfig = {
          apiKey: "AIzaSyBV9Su1N1_ZV_LC7jRngxorp0MCDXlqdkc",
          authDomain: "supersistcv.firebaseapp.com",
          projectId: "supersistcv",
          storageBucket: "supersistcv.firebasestorage.app",
          messagingSenderId: "617639493726",
          appId: "1:617639493726:web:dc8fcb573a4a0851d6f4cf",
          measurementId: "G-DTS51YCQ3W"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('btnRegistrar').addEventListener('click', async () => {
            const email = document.getElementById('correo').value;
            const pass = document.getElementById('clave').value;

            if(!email.includes('@')) { alert("Ingresa un correo válido"); return; }

            try {
                // Intentamos registrar al nuevo usuario
                await createUserWithEmailAndPassword(auth, email, pass);
                alert("¡Registro Exitoso, León!");
                window.location.href = "uju.html"; 
            } catch (e) {
                // Si el correo ya existe (porque tus pruebas anteriores funcionaron), entramos directo
                if (e.code === 'auth/email-already-in-use') {
                    try {
                        await signInWithEmailAndPassword(auth, email, pass);
                        window.location.href = "uju.html";
                    } catch (err) {
                        alert("La contraseña es incorrecta.");
                    }
                } else {
                    alert("Aviso: " + e.message);
                }
            }
        });
    </script>
</body>
</html>
