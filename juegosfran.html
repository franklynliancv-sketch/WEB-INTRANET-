<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUPERSIST - MODO TROLL</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body {
            background: #1a1a1a;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: background 0.1s;
        }
        
        /* Animación de sacudida cuando pierdes */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(-1deg); }
            40% { transform: translate(3px, 2px) rotate(1deg); }
            60% { transform: translate(-3px, 1px) rotate(-1deg); }
            80% { transform: translate(3px, 1px) rotate(1deg); }
            100% { transform: translate(1px, -2px) rotate(0deg); }
        }

        .shaking { animation: shake 0.3s; background: #400 !important; }

        #header {
            padding: 15px;
            text-align: center;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            width: 100%;
            background: #000;
            border-bottom: 2px solid #ff0000;
        }

        #troll-box {
            background: #333;
            width: 100%;
            padding: 10px;
            text-align: center;
            color: #ff0000;
            font-weight: bold;
            font-size: 14px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid #555;
        }

        #canvas-wrap {
            border: 5px solid #000;
            margin-top: 10px;
            box-shadow: 0 0 20px rgba(255,0,0,0.2);
        }

        canvas { display: block; background: #e6e6fa; }

        .controls {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(3, 75px);
            grid-template-rows: repeat(2, 75px);
            gap: 12px;
        }
        .btn {
            background: #222;
            color: #fff;
            border: 3px solid #444;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 4px 0 #000;
        }
        .btn:active { background: #ff0000; transform: translateY(4px); box-shadow: none; }
        .up { grid-column: 2; }
        .left { grid-column: 1; grid-row: 2; }
        .down { grid-column: 2; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

<div id="header">
    <div style="color: #FFD700;">SUPERSIST CHALLENGE</div>
    <div style="margin-top:5px;">LVL: <span id="lvl-ui">1</span> | MUERTES: <span id="death-ui">0</span></div>
</div>

<div id="troll-box">¿LISTO PARA FRACASAR?</div>

<div id="canvas-wrap">
    <canvas id="game" width="360" height="240"></canvas>
</div>

<div class="controls">
    <div class="btn up" id="up">▲</div>
    <div class="btn left" id="left">◀</div>
    <div class="btn down" id="down">▼</div>
    <div class="btn right" id="right">▶</div>
</div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const trollBox = document.getElementById('troll-box');
    const body = document.body;

    const insultos = [
        "¡NO PUEDES JAJAJA! 😂",
        "¿MANCO? ¡MANQUÍSIMO! 🤡",
        "BORRA EL JUEGO, ENSERIO.",
        "MI GATO SE PASA ESTO CON UNA PATA.",
        "JAJAJA ¡OTRA VEZ AL INICIO!",
        "¿ERES UN LEÓN O UN GATITO? 🐱",
        "DAS PENA, CAUSA. 💀",
        "NI MI ABUELA MUERE TANTO.",
        "¡PENETRADO POR UNA BOLA AZUL! 😂",
        "¿TE RENDIMOS YA?",
        "SIGUE INTENTANDO... (NUNCA PASARÁS)",
        "¡QUÉ MALO ERES, POR DIOS!",
        "JAJAJA NO PUEDES, NO PUEDES.",
        "TE FALTA PERSISTENCIA Y MANOS.",
        "¿QUIERES QUE TE PONGA MÁS FÁCIL? NO. 😈"
    ];

    let lvl = 1;
    let deaths = 0;
    const player = { x: 20, y: 110, size: 16, speed: 3.8 };
    let enemies = [];
    let keys = {};

    function loadLevel(n) {
        enemies = [];
        player.x = 25;
        player.y = 110;
        switch(n) {
            case 1: for(let i=0; i<3; i++) enemies.push({x: 100+(i*80), y: 50, r: 8, spd: 4, type: 'v'}); break;
            case 2: for(let i=0; i<5; i++) enemies.push({x: 80+(i*50), y: 180, r: 8, spd: 6, type: 'v'}); break;
            case 3: for(let i=0; i<5; i++) enemies.push({x: 100, y: 30+(i*45), r: 7, spd: 5, type: 'h'}); break;
            case 4: for(let i=0; i<8; i++) enemies.push({x: 80+(i*30), y: (i%2==0?20:220), r: 7, spd: 7, type: 'v'}); break;
            case 5: 
                const cx = 180, cy = 120;
                for(let i=0; i<12; i++) enemies.push({ angle: (i/12)*Math.PI*2, radius: 65, cx, cy, r: 8, type: 'rot' });
                break;
        }
        document.getElementById('lvl-ui').innerText = lvl;
    }

    const setupInput = (id, key) => {
        const el = document.getElementById(id);
        const start = (e) => { e.preventDefault(); keys[key] = true; };
        const end = () => keys[key] = false;
        el.addEventListener('touchstart', start);
        el.addEventListener('touchend', end);
        el.addEventListener('mousedown', start);
        el.addEventListener('mouseup', end);
    };
    setupInput('up', 'w'); setupInput('down', 's');
    setupInput('left', 'a'); setupInput('right', 'd');

    function onDeath() {
        deaths++;
        document.getElementById('death-ui').innerText = deaths;
        trollBox.innerText = insultos[Math.floor(Math.random() * insultos.length)];
        
        // Efectos de burla visual
        body.classList.add('shaking');
        setTimeout(() => body.classList.remove('shaking'), 300);
        
        loadLevel(lvl);
    }

    function update() {
        if (keys['w']) player.y -= player.speed;
        if (keys['s']) player.y += player.speed;
        if (keys['a']) player.x -= player.speed;
        if (keys['d']) player.x += player.speed;

        player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
        player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));

        enemies.forEach(en => {
            if(en.type === 'v') { en.y += en.spd; if(en.y < 10 || en.y > 230) en.spd *= -1; }
            else if(en.type === 'h') { en.x += en.spd; if(en.x < 80 || en.x > 280) en.spd *= -1; }
            else if(en.type === 'rot') { en.angle += 0.05; en.x = en.cx + Math.cos(en.angle) * en.radius; en.y = en.cy + Math.sin(en.angle) * en.radius; }

            let dx = (player.x + 8) - en.x;
            let dy = (player.y + 8) - en.y;
            if(Math.sqrt(dx*dx + dy*dy) < 15) onDeath();
        });

        if(player.x > 310) {
            if(lvl < 5) { lvl++; trollBox.innerText = "¡SUERTE DE NOOB! NIVEL SIGUIENTE."; loadLevel(lvl); }
            else { alert("POR FIN, YA ME ESTABA DURMIENDO."); lvl = 1; deaths = 0; loadLevel(1); }
        }
    }

    function draw() {
        ctx.clearRect(0,0, canvas.width, canvas.height);
        for(let i=0; i<canvas.width; i+=20) {
            for(let j=0; j<canvas.height; j+=20) {
                ctx.fillStyle = (i+j)/20 % 2 === 0 ? '#eee' : '#ddd';
                ctx.fillRect(i, j, 20, 20);
            }
        }
        ctx.fillStyle = '#7cfc00';
        ctx.fillRect(0,0, 60, 240);
        ctx.fillRect(300,0, 60, 240);
        ctx.fillStyle = '#002D5A';
        ctx.fillRect(player.x, player.y, player.size, player.size);
        ctx.strokeRect(player.x, player.y, player.size, player.size);
        ctx.fillStyle = 'red';
        enemies.forEach(en => {
            ctx.beginPath(); ctx.arc(en.x, en.y, en.r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        });
        update();
        requestAnimationFrame(draw);
    }
    loadLevel(1);
    draw();
</script>
</body>
</html>
